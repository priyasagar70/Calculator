<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <!-- Link to our external CSS file for styling -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <!-- Display screen that shows the numbers and result -->
        <!-- 'disabled' prevents users from typing with keyboard, forcing them to use buttons -->
        <input type="text" id="display" class="display" disabled placeholder="0">
        
        <!-- Grid container for all the buttons -->
        <div class="buttons">
            <!-- First row -->
            <button class="btn number" onclick="appendNumber('7')">7</button>
            <button class="btn number" onclick="appendNumber('8')">8</button>
            <button class="btn number" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('/')">/</button>
            
            <!-- Second row -->
            <button class="btn number" onclick="appendNumber('4')">4</button>
            <button class="btn number" onclick="appendNumber('5')">5</button>
            <button class="btn number" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('*')">*</button>
            
            <!-- Third row -->
            <button class="btn number" onclick="appendNumber('1')">1</button>
            <button class="btn number" onclick="appendNumber('2')">2</button>
            <button class="btn number" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="appendOperator('-')">-</button>
            
            <!-- Fourth row -->
            <button class="btn clear" onclick="clearDisplay()">C</button>
            <button class="btn number" onclick="appendNumber('0')">0</button>
            <button class="btn equals" onclick="calculate()">=</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>
        </div>
    </div>

    <!-- Link to our external JavaScript file for functionality -->
    <script src="script.js"></script>
</body>
</html>
